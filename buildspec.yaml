version: 0.2

phases:
  install:
    commands:
      - echo "Installing kubectl..."
      - curl -o kubectl https://amazon-eks.s3.us-east-1.amazonaws.com/1.27.1/2023-04-19/bin/linux/amd64/kubectl
      - chmod +x kubectl
      - mv kubectl /usr/local/bin/
      - kubectl version --client

  pre_build:
    commands:
      - echo "Setting variables..."
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REGION=us-east-1
      - REPO_NAME=eks-hello
      - IMAGE_TAG=latest
      - IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$REPO_NAME:$IMAGE_TAG

      - echo "Logging in to ECR..."
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t $REPO_NAME .

      - echo "Tagging image..."
      - docker tag $REPO_NAME:latest $IMAGE_URI

      - echo "Pushing image to ECR..."
      - docker push $IMAGE_URI

      - echo "Updating deployment file..."
      - sed -i "s|IMAGE_URI|$IMAGE_URI|g" k8s/deployment.yaml

      - echo "Connecting to EKS..."
      - aws eks update-kubeconfig --region $REGION --name eks-cluster

      - echo "Deploying to EKS..."
      - kubectl apply -f k8s/deployment.yaml
      - kubectl apply -f k8s/service.yaml

  post_build:
    commands:
      - echo "Deployment completed successfully!"
